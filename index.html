<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nice Views &mdash; Scenic Spots, Roads, &amp; Restrooms Across MA &amp; NH</title>
<meta name="description" content="Interactive Leaflet map of curated scenic viewpoints, waterfalls, beaches, motorcycle routes, and public restrooms across Massachusetts and New Hampshire.">
<meta name="theme-color" content="#0F1A2E">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --night:#0F1A2E;--night-mid:#1A2744;--night-light:#243352;
  --gold:#E8A838;--gold-light:#F2C56B;--gold-pale:#FBE8C4;--gold-dim:rgba(232,168,56,.12);
  --sunset:#D4623B;--sunset-light:#E8845A;
  --sky:#5B8FB9;--sky-light:#7CAFD4;--sky-pale:#C5DFF0;
  --pine:#2D5F3A;--pine-light:#4A8B5E;
  --sand:#F5EDE0;--cream:#FDF8F0;--white:#FFFFFF;
  --text:#0F1A2E;--text-mid:#4A5568;--text-light:#8896A7;
  --shadow:0 4px 20px rgba(15,26,46,.12);--shadow-lg:0 12px 40px rgba(15,26,46,.18);
}
html,body{overflow-x:hidden;max-width:100vw}
body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text)}

/* ===== MOBILE-FIRST BASE (320px+) ===== */

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--night) 0%,var(--night-mid) 50%,#2A1F3D 100%);
  padding:6px 16px;position:relative;overflow:hidden;text-align:center;
}
.header::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 70% 20%,rgba(232,168,56,.15) 0%,transparent 60%),
             radial-gradient(ellipse at 20% 80%,rgba(212,98,59,.1) 0%,transparent 50%);
}
.header::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header h1{
  font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);
  letter-spacing:-.5px;position:relative;line-height:1;
}
.header h1 em{font-style:italic;color:var(--gold-light)}
.header .subtitle{display:none}
.header .tagline{display:none}

/* LAYOUT — mobile is single column */
.main{display:flex;flex-direction:column;height:calc(100vh - 30px);height:calc(100dvh - 30px)}

/* SIDEBAR — horizontal pill bar on mobile */
.sidebar{
  background:var(--white);border-bottom:1px solid rgba(15,26,46,.06);
  padding:6px 8px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  display:flex;gap:5px;flex-shrink:0;scrollbar-width:none;
}
.sidebar::-webkit-scrollbar{display:none}
.sidebar .section-title,.sidebar .legend-grid,.sidebar .spot-count,.sidebar .spot-detail{display:none}
#routeButtons{display:flex;gap:5px;flex-shrink:0}

/* ROUTE BUTTONS — pills on mobile */
.route-btn{
  display:flex;align-items:center;gap:3px;padding:5px 10px;
  border:1px solid rgba(15,26,46,.1);border-radius:16px;
  font-family:inherit;font-size:.65rem;color:var(--text);background:var(--cream);
  cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:500;
  min-height:30px;touch-action:manipulation;flex-shrink:0;
}
.route-btn:hover{border-color:var(--gold);background:var(--gold-dim)}
.route-btn.active{background:var(--night);color:var(--gold);border-color:var(--night)}
.route-btn .route-icon{font-size:.75rem;flex-shrink:0}
.route-btn .route-count{display:none}

/* MAP — fills available space */
/* STACKING ORDER (read before changing z-index or moving elements):
   .map-wrap has z-index:0 to create a stacking context that confines
   Leaflet's internal panes (markers 600, popups 700, controls 800),
   keeping them from leaking on top of .bottom-panel on desktop where
   the panel overlays the map.
   Bottom→top, in document order:
     1. .map-wrap (z:0, contains all Leaflet content)
     2. .bottom-panel (auto z, painted after map-wrap by tree order)
     3. .spot-sheet (position:fixed, z:1100 in ROOT context)
   .spot-sheet MUST stay a child of <body> — if you move it into
   .map-wrap its z:1100 gets trapped at level 0 and the panel covers it. */
.map-wrap{flex:1;position:relative;min-height:200px;z-index:0}
#map{position:absolute;top:0;left:0;right:0;bottom:0}

/* MARKER STYLES */
.marker-icon{filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));transition:transform .15s}
.marker-icon:hover{transform:scale(1.2);z-index:9999!important}
.mk-marker{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.2)}
.mk-marker img{width:20px;height:20px;filter:brightness(0) invert(1);pointer-events:none}
.mk-marker.bg-svg img{width:28px;height:28px;filter:none;mix-blend-mode:screen}
.mk-marker.white-svg img{width:22px;height:22px;filter:none}
.om-marker{width:36px;height:36px;pointer-events:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))}
@media(min-width:768px){.mk-marker{width:36px;height:36px}.mk-marker img{width:22px;height:22px}.mk-marker.bg-svg img{width:32px;height:32px}.mk-marker.white-svg img{width:26px;height:26px}.om-marker{width:42px;height:42px}}

/* USER LOCATION — pulsing blue dot */
.user-dot{position:relative;width:18px;height:18px}
.user-dot::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:#3b82f6;opacity:.4;
  animation:userPulse 2s ease-out infinite;
}
.user-dot::after{
  content:'';position:absolute;top:3px;left:3px;width:12px;height:12px;
  border-radius:50%;background:#3b82f6;border:2px solid #fff;
  box-shadow:0 0 0 1px rgba(0,0,0,.2);
}
@keyframes userPulse{
  0%{transform:scale(1);opacity:.5}
  100%{transform:scale(2.6);opacity:0}
}
.leaflet-control-locate{
  background:#fff;width:34px;height:34px;border-radius:4px;
  box-shadow:0 1px 5px rgba(0,0,0,.4);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  color:var(--text-mid);transition:color .15s;
}
.leaflet-control-locate:hover{color:#3b82f6}
.leaflet-control-locate.active{color:#3b82f6}
.leaflet-control-locate.error{color:#ef4444}
.leaflet-control-fs{
  background:#fff;width:34px;height:34px;border-radius:4px;
  box-shadow:0 1px 5px rgba(0,0,0,.4);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  color:var(--text-mid);transition:color .15s;
}
.leaflet-control-fs:hover{color:var(--night)}
body.map-fullscreen .header,
body.map-fullscreen .sidebar,
body.map-fullscreen .bottom-panel{display:none!important}
body.map-fullscreen .main{height:100vh;height:100dvh}
body.map-fullscreen .map-wrap{flex:1 1 100%}
@media(min-width:1024px){
  body.map-fullscreen .bottom-panel{display:none!important}
  body.map-fullscreen .main{flex-direction:row}
}

/* POPUP — hidden on mobile, used on desktop */
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:var(--shadow-lg);overflow:hidden;padding:0}
.leaflet-popup-content{margin:0;min-width:200px;max-width:260px}
.leaflet-popup-tip{box-shadow:none}

/* BOTTOM SHEET — mobile spot detail */
.spot-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:1100;
  background:var(--white);border-radius:16px 16px 0 0;
  box-shadow:0 -4px 30px rgba(15,26,46,.2);
  transform:translateY(100%);transition:transform .3s ease;
  max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom);
}
.spot-sheet.open{transform:translateY(0)}
.spot-sheet-handle{width:36px;height:4px;background:rgba(15,26,46,.15);border-radius:2px;margin:8px auto}
.spot-sheet-close{position:absolute;top:8px;right:12px;width:32px;height:32px;border:none;background:rgba(15,26,46,.7);border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;touch-action:manipulation;z-index:2}
.spot-sheet-img{width:100%;height:160px;background:var(--night-light);position:relative;overflow:hidden}
.spot-sheet-img img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-track{display:flex;transition:transform .3s ease;height:100%}
.gallery-track img{width:100%;height:100%;object-fit:cover;flex-shrink:0}
.gallery-btn{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border:none;background:rgba(15,26,46,.5);color:#fff;border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;touch-action:manipulation}
.gallery-btn:hover{background:rgba(15,26,46,.8)}
.gallery-prev{left:6px}
.gallery-next{right:6px}
.gallery-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.gallery-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);border:none;padding:0;cursor:pointer}
.gallery-dot.active{background:#fff}
@media(min-width:1024px){
  .spot-sheet{max-height:70vh;max-width:500px;left:auto;right:20px;border-radius:16px}
  .spot-sheet-img{height:auto;max-height:50vh}
  .gallery-track img{object-fit:contain}
}
.spot-sheet-img .ss-cat{position:absolute;top:8px;left:8px;padding:3px 10px;border-radius:12px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff}
.spot-sheet-img .ss-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.3);font-size:.7rem}
.spot-sheet-body{padding:12px 16px 16px}
.spot-sheet-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--night);line-height:1.2;margin-bottom:2px}
.spot-sheet-note{font-size:.68rem;color:var(--text-light);font-weight:500;margin-bottom:8px}
.spot-sheet-grid{display:flex;gap:12px;flex-wrap:wrap;font-size:.72rem;color:var(--text-mid);margin-bottom:10px}
.spot-sheet-grid strong{color:var(--night);font-weight:600}
.spot-sheet-links{display:flex;gap:6px;flex-wrap:wrap}

.vp{font-family:'Source Sans 3',sans-serif}
.vp-img{width:100%;height:120px;background:var(--night-light);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.vp-img img{width:100%;height:100%;object-fit:cover}
.vp-img .vp-loading{color:rgba(255,255,255,.3);font-size:.7rem}
.vp-img .vp-cat{position:absolute;top:8px;left:8px;padding:3px 10px;border-radius:12px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff}
.vp-body{padding:12px 14px 10px}
.vp-name{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--night);line-height:1.2;margin-bottom:2px}
.vp-num{font-size:.62rem;color:var(--text-light);font-weight:600;margin-bottom:6px}
.vp-grid{display:grid;grid-template-columns:1fr;gap:2px}
.vp-item{font-size:.72rem;color:var(--text-mid)}
.vp-item strong{color:var(--night);font-weight:600}
.vp-links,.spot-sheet-links a{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.vp-link,.ss-link{
  display:inline-flex;align-items:center;gap:3px;padding:8px 14px;
  border-radius:8px;font-size:.7rem;font-weight:600;text-decoration:none;transition:all .2s;
  touch-action:manipulation;
}
.vp-link-maps,.ss-link-maps{background:rgba(91,143,185,.12);color:var(--sky)}
.vp-link-sv,.ss-link-sv{background:rgba(232,168,56,.12);color:var(--gold)}
.vp-link-w3w,.ss-link-w3w{background:rgba(212,98,59,.1);color:var(--sunset)}

/* BOTTOM PANEL */
.bottom-panel{
  background:var(--white);border-top:3px solid var(--gold);
  flex-shrink:0;max-height:40vh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}
.panel-header{
  padding:10px 16px;background:var(--night);color:var(--gold);
  font-family:inherit;font-size:.7rem;font-weight:600;text-transform:uppercase;
  letter-spacing:1.2px;flex-shrink:0;
}
.panel-body{padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}

/* TABLE — hide GPS & W3W on mobile */
.cat-badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.2px;color:#fff;white-space:nowrap}

/* ROUTE CARDS */
.route-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.route-card{background:var(--cream);border-radius:8px;padding:10px;border-left:3px solid var(--gold)}
.route-card h3{font-family:'Playfair Display',serif;font-size:.85rem;color:var(--night);margin-bottom:6px}
.route-stop{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.7rem;color:var(--text-mid);cursor:pointer;touch-action:manipulation}
.route-stop .stop-num{width:16px;height:16px;border-radius:50%;background:var(--night);color:var(--gold);font-size:.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ===== TABLET (768px+) ===== */
@media(min-width:768px){
  .header{padding:20px 32px 16px;text-align:left}
  .header h1{font-size:2rem}
  .header .subtitle{display:block;font-size:.78rem;color:rgba(255,255,255,.5);font-weight:300;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
  .main{height:calc(100vh - 90px);height:calc(100dvh - 90px)}
  .route-cards{grid-template-columns:1fr 1fr}
  .route-card{padding:14px}
  .route-card h3{font-size:1rem}
  .route-stop{font-size:.78rem;gap:8px;padding:5px 0}
  .route-stop .stop-num{width:20px;height:20px;font-size:.6rem}
  .header .tagline{display:block;font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.35);margin-top:4px;position:relative}
  .main{height:calc(100vh - 100px);height:calc(100dvh - 100px)}
  .sidebar{padding:10px 16px;gap:8px}
  .route-btn{padding:9px 14px;font-size:.76rem}
  .leaflet-popup-content{min-width:240px;max-width:300px}
  .vp-img{height:140px}
  .vp-name{font-size:1.05rem}
  .vp-grid{grid-template-columns:1fr 1fr}
  .cat-badge{font-size:.58rem;padding:2px 8px}
  .route-cards{grid-template-columns:1fr 1fr}
}

/* ===== DESKTOP (1024px+) ===== */
@media(min-width:1024px){
  .header{padding:12px 32px 18px;text-align:left}
  .header h1{font-size:1.7rem}
  .header .subtitle{font-size:.78rem}
  .header .tagline{display:block;font-size:.85rem}
  .main{flex-direction:row;height:calc(100vh - 75px);height:calc(100dvh - 75px)}
  .route-cards{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .route-card{padding:16px;border-radius:10px}
  .route-card h3{font-size:1rem;margin-bottom:8px}

  /* Sidebar becomes vertical panel */
  .sidebar{
    flex-direction:column;width:260px;flex-shrink:0;
    padding:16px;overflow-x:hidden;overflow-y:auto;
    border-bottom:none;border-right:1px solid rgba(15,26,46,.06);
    gap:0;
  }
  #routeButtons{display:block}
  .sidebar .section-title{display:block;font-size:.58rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-light);font-weight:600;margin-bottom:8px;margin-top:14px}
  .sidebar .section-title:first-child{margin-top:0}
  .sidebar .legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .sidebar .spot-count{display:block;font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--night)}
  .sidebar .spot-detail{display:block;font-size:.72rem;color:var(--text-light)}
  .route-btn{
    width:100%;border-radius:8px;padding:9px 12px;font-size:.78rem;
    margin-bottom:5px;white-space:normal;
  }
  .route-btn .route-icon{width:22px;text-align:center}
  .route-btn .route-count{display:inline;margin-left:auto;font-size:.65rem;opacity:.5;font-weight:600}

  /* Legend items */
  .legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--text-mid);padding:3px 0}
  .legend-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

  /* Map & bottom panel fill remaining space */
  .map-wrap{flex:1}
  .bottom-panel{position:absolute;bottom:0;left:260px;right:0;max-height:320px}
  .main{position:relative}

  .leaflet-popup-content{min-width:260px;max-width:300px}
  .vp-img{height:150px}
  .vp-name{font-size:1.1rem}
  .vp-body{padding:14px 16px 12px}
  .route-cards{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
}

/* ===== LARGE DESKTOP (1440px+) ===== */
@media(min-width:1440px){
  .header{padding:12px 60px 18px}
  .sidebar{width:300px}
  .bottom-panel{left:300px}
}
</style>
</head>
<body>
<div class="header">
  <h1>You'll Thank Me <em>After</em></h1>
  <div class="subtitle">Nice Views &middot; Scenic Spots Across MA &amp; NH</div>
  <div class="tagline">Mountains, waterfalls, beaches, motorcycle routes, and hidden gems</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="section-title">Routes</div>
    <div id="routeButtons"></div>

    <div class="section-title">Legend</div>
    <div class="legend-grid" id="legendGrid"></div>

    <div class="section-title" style="margin-top:16px">Showing</div>
    <div class="spot-count" id="spotCount"></div>
    <div class="spot-detail" id="spotDetail">All locations</div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
  </div>

  <div class="bottom-panel">
    <div class="panel-header">Route Planner</div>
    <div class="panel-body">
      <div class="route-cards" id="routeCards"></div>
    </div>
  </div>
</div>

<div class="spot-sheet" id="spotSheet">
  <div class="spot-sheet-handle"></div>
  <button class="spot-sheet-close" id="spotSheetClose">&times;</button>
  <div class="spot-sheet-img" id="ssImg"><span class="ss-loading">Loading...</span></div>
  <div class="spot-sheet-body">
    <div class="spot-sheet-name" id="ssName"></div>
    <div class="spot-sheet-note" id="ssNote"></div>
    <div class="spot-sheet-grid" id="ssGrid"></div>
    <div class="spot-sheet-links" id="ssLinks"></div>
  </div>
</div>

<script>
let SPOTS, WIKI_TERMS, CATS, ROUTES, ROUTE_ORDER;

fetch('spots.json').then(r=>r.json()).then(data=>{
  SPOTS = data.spots;
  WIKI_TERMS = data.wikiTerms;
  CATS = data.cats;
  ROUTES = data.routes;
  ROUTE_ORDER = data.routeOrder;
  initApp();
});

function initApp(){

// 'Within 30 mi' filter — distance from the user's GPS position if known,
// otherwise from Chelmsford center. lastUserLatLng is updated by the GPS
// watcher at the bottom of initApp.
let lastUserLatLng = null;
const NEARBY_CENTER_DEFAULT = [42.6, -71.35];
const NEARBY_M = 30 * 1609.34;
function nearbyDist(s){
  const c = lastUserLatLng ? [lastUserLatLng.lat, lastUserLatLng.lng] : NEARBY_CENTER_DEFAULT;
  const dlat = (s.lat - c[0]) * 111000;
  const dlng = (s.lng - c[1]) * 111000 * Math.cos(c[0]*Math.PI/180);
  return Math.sqrt(dlat*dlat + dlng*dlng);
}

const map = L.map('map',{zoomControl:true}).setView([42.48,-71.30],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:'abcd'
}).addTo(map);

// Render route buttons from data
(function renderRoutes(){
  const container = document.getElementById('routeButtons');
  // Cats whose entries render via their own toggle layer, never in the route radio.
  const TOGGLE_CATS = ['restroom','road'];
  const isToggleSpot = s => s.cats.some(c => TOGGLE_CATS.includes(c));
  const countFor = key => {
    if(key==='all') return SPOTS.filter(s=>!isToggleSpot(s)).length;
    if(key==='nearby') return SPOTS.filter(s=>!isToggleSpot(s) && nearbyDist(s) <= NEARBY_M).length;
    return SPOTS.filter(s=>s.routes.includes(key)).length;
  };
  const order = ['all','nearby','local','ponds','boston','north','south','east','west','restrooms','roads'];
  container.innerHTML = order.filter(k=>k==='all'||ROUTES[k]).map((k,i)=>{
    const r = k==='all' ? {label:'All Spots', icon:'◎'} : ROUTES[k];
    return `<button class="route-btn${i===0?' active':''}" data-route="${k}"><span class="route-icon">${r.icon}</span>${r.label}<span class="route-count">${countFor(k)}</span></button>`;
  }).join('');
})();

// Render legend from cats — use map-marker style (disc + representative OsmAnd icon per cat)
function renderLegend(){
  const grid = document.getElementById('legendGrid');
  const repIcon = {};
  for(const s of SPOTS){ const k = s.cats[0]; if(!repIcon[k]) repIcon[k] = s.icon; }
  grid.innerHTML = Object.entries(CATS).sort((a,b)=>a[1].label.localeCompare(b[1].label)).map(([k,c])=>{
    const ic = c.icon || repIcon[k];
    const disc = ic
      ? `<span class="legend-icon" style="width:22px;height:22px;border-radius:50%;background:${c.color};border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.2);display:inline-flex;align-items:center;justify-content:center"><img src="${iconUrl(ic)}" style="width:14px;height:14px;filter:brightness(0) invert(1)"></span>`
      : `<span class="legend-icon">${c.svg}</span>`;
    return `<div class="legend-item">${disc}${c.label}</div>`;
  }).join('');
}

// Bottom sheet elements
const sheet = document.getElementById('spotSheet');
const ssImg = document.getElementById('ssImg');
const ssName = document.getElementById('ssName');
const ssNote = document.getElementById('ssNote');
const ssGrid = document.getElementById('ssGrid');
const ssLinks = document.getElementById('ssLinks');


function closeSheet(){sheet.classList.remove('open');sheet.style.transform='';}
document.getElementById('spotSheetClose').addEventListener('click',function(e){e.stopPropagation();closeSheet();});
map.on('click',closeSheet);

// Drag-to-dismiss
let dragStartY=0, dragCurrentY=0, dragging=false;
sheet.addEventListener('touchstart',function(e){
  dragStartY=e.touches[0].clientY;
  dragCurrentY=dragStartY;
  dragging=true;
  sheet.style.transition='none';
},{passive:true});
sheet.addEventListener('touchmove',function(e){
  if(!dragging)return;
  dragCurrentY=e.touches[0].clientY;
  const dy=dragCurrentY-dragStartY;
  if(dy>0) sheet.style.transform='translateY('+dy+'px)';
},{passive:true});
sheet.addEventListener('touchend',function(){
  if(!dragging)return;
  dragging=false;
  sheet.style.transition='transform .3s ease';
  const dy=dragCurrentY-dragStartY;
  if(dy>80){
    closeSheet();
  } else {
    sheet.style.transform='translateY(0)';
  }
});

let galleryIdx=0, galleryLen=0;

function loadSpotImg(el, spot){
  const cat = CATS[spot.cats[0]];
  const imgs = spot.images || [];

  if(imgs.length > 0){
    galleryIdx=0;
    galleryLen=imgs.length;
    const track = imgs.map(src=>'<img src="'+src+'" alt="'+spot.name+'">').join('');
    const dots = imgs.length>1 ? '<div class="gallery-dots">'+imgs.map((_,i)=>'<button class="gallery-dot'+(i===0?' active':'')+'" data-i="'+i+'"></button>').join('')+'</div>' : '';
    const btns = imgs.length>1 ? '<button class="gallery-btn gallery-prev">&#8249;</button><button class="gallery-btn gallery-next">&#8250;</button>' : '';
    el.innerHTML = '<div class="gallery-track">'+track+'</div>'+btns+dots+'<div class="ss-cat" style="background:'+cat.color+'">'+cat.label+'</div>';

    if(imgs.length>1){
      const trackEl=el.querySelector('.gallery-track');
      el.querySelector('.gallery-prev').addEventListener('click',function(e){e.stopPropagation();galleryIdx=(galleryIdx-1+galleryLen)%galleryLen;updateGallery(el,trackEl);});
      el.querySelector('.gallery-next').addEventListener('click',function(e){e.stopPropagation();galleryIdx=(galleryIdx+1)%galleryLen;updateGallery(el,trackEl);});
      el.querySelectorAll('.gallery-dot').forEach(d=>d.addEventListener('click',function(e){e.stopPropagation();galleryIdx=+this.dataset.i;updateGallery(el,trackEl);}));
    }
  } else {
    const ic = spot.icon || cat.icon;
    const fallback = ic
      ? '<img src="'+iconUrl(ic)+'" style="width:56px;height:56px;opacity:.5;filter:brightness(0) invert(1)">'
      : '<span style="font-size:2rem">'+({mountain:'⛰️',waterfall:'💧',beach:'🏖️',river:'🌊',canal:'🚣',lookout:'🔭',historic:'🏛️',park:'🌳',restroom:'🚻'}[spot.cats[0]] || '')+'</span>';
    el.innerHTML = '<span class="ss-loading">'+fallback+'</span><div class="ss-cat" style="background:'+cat.color+'">'+cat.label+'</div>';
  }
}

function updateGallery(container,track){
  track.style.transform='translateX(-'+galleryIdx*100+'%)';
  container.querySelectorAll('.gallery-dot').forEach((d,i)=>d.classList.toggle('active',i===galleryIdx));
}

function openSheet(s){
  const cat = CATS[s.cats[0]];
  const svUrl = 'https://www.google.com/maps/@'+s.lat+','+s.lng+',3a,75y,90t/data=!3m4!1e1!3m2!1d'+s.lat+'!2d'+s.lng;
  const mapsUrl = 'https://www.google.com/maps?q='+s.lat+','+s.lng;
  const w3wUrl = s.w3w ? 'https://what3words.com/'+s.w3w : null;
  const catBadges = s.cats.map(c=>{const cc=CATS[c];return '<span class="cat-badge" style="background:'+cc.color+'">'+cc.label+'</span>';}).join(' ');

  ssImg.innerHTML = '<span class="ss-loading">Loading...</span><div class="ss-cat" style="background:'+cat.color+'">'+cat.label+'</div>';
  ssName.textContent = s.name;
  // Show #ID only for the 35 curated originals (id < 100); auto-imported entries get just the note.
  const idPrefix = s.id < 100 ? '#'+s.id+' · ' : '';
  ssNote.innerHTML = idPrefix+s.note+'<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">'+catBadges+'</div>';
  ssGrid.innerHTML = '<div><strong>GPS:</strong> '+s.lat.toFixed(4)+', '+s.lng.toFixed(4)+'</div>'+(s.w3w?'<div><strong>W3W:</strong> '+s.w3w+'</div>':'');
  ssLinks.innerHTML =
    '<a href="'+mapsUrl+'" target="_blank" rel="noopener" class="ss-link ss-link-maps">&#x1F5FA; Maps</a>'+
    '<a href="'+svUrl+'" target="_blank" rel="noopener" class="ss-link ss-link-sv">&#x1F4CD; Street View</a>'+
    (w3wUrl?'<a href="'+w3wUrl+'" target="_blank" rel="noopener" class="ss-link ss-link-w3w">/// W3W</a>':'');

  sheet.classList.add('open');
  loadSpotImg(ssImg, s);
}

const spotMarkers = {};
const MK_SIZE = window.innerWidth >= 768 ? 36 : 32;
function iconUrl(ic){
  if(ic.startsWith('hi:'))return `https://api.iconify.design/hugeicons/${ic.slice(3)}.svg?color=%23ffffff`;
  if(ic.startsWith('tb:'))return `https://api.iconify.design/tabler/${ic.slice(3)}.svg?color=%23ffffff`;
  if(ic.startsWith('fe:'))return `https://api.iconify.design/fluent-emoji-flat/${ic.slice(3)}.svg`;
  if(ic.startsWith('osa:'))return `https://cdn.jsdelivr.net/gh/osmandapp/OsmAnd-resources@master/icons/svg/${ic.slice(4)}.svg`;
  if(ic.startsWith('om:'))return `https://cdn.jsdelivr.net/gh/organicmaps/organicmaps@master/data/styles/default/light/symbols/${ic.slice(3)}-m.svg`;
  if(ic.startsWith('sjjb:'))return `https://cdn.jsdelivr.net/gh/twain47/Open-SVG-Map-Icons@master/svg/${ic.slice(5)}.svg`;
  if(ic.startsWith('temaki:'))return `https://cdn.jsdelivr.net/npm/@rapideditor/temaki/icons/${ic.slice(7)}.svg`;
  if(ic.startsWith('maki:'))return `https://cdn.jsdelivr.net/npm/@mapbox/maki/icons/${ic.slice(5)}.svg`;
  if(ic.startsWith('osm:'))return `https://cdn.jsdelivr.net/gh/gravitystorm/openstreetmap-carto/symbols/${ic.slice(4)}.svg`;
  return `https://cdn.jsdelivr.net/npm/@mapbox/maki/icons/${ic}.svg`;
}
function isStandalone(ic){return ic.startsWith('om:')||ic.startsWith('fe:');}
function isBgSvg(ic){return ic.startsWith('sjjb:');}
function isWhiteSvg(ic){return ic.startsWith('osa:')||ic.startsWith('hi:')||ic.startsWith('tb:');}
renderLegend();
SPOTS.forEach(s => {
  const cat = CATS[s.cats[0]];
  const extra = s.icon && isBgSvg(s.icon) ? ' bg-svg' : (s.icon && isWhiteSvg(s.icon) ? ' white-svg' : '');
  const html = s.icon
    ? (isStandalone(s.icon)
        ? `<img class="om-marker" src="${iconUrl(s.icon)}" alt="${s.icon}">`
        : `<div class="mk-marker${extra}" style="background:${cat.color}"><img src="${iconUrl(s.icon)}" alt="${s.icon}"></div>`)
    : cat.svg;
  const icon = L.divIcon({
    className:'marker-icon',
    html,
    iconSize:[MK_SIZE,MK_SIZE],
    iconAnchor:[MK_SIZE/2,MK_SIZE/2]
  });
  const m = L.marker([s.lat,s.lng],{icon});

  // Popup content (created on demand for desktop)
  const imgId = 'vp-img-'+s.id;
  const svUrl = 'https://www.google.com/maps/@'+s.lat+','+s.lng+',3a,75y,90t/data=!3m4!1e1!3m2!1d'+s.lat+'!2d'+s.lng;
  const mapsUrl = 'https://www.google.com/maps?q='+s.lat+','+s.lng;
  const w3wUrl = s.w3w ? 'https://what3words.com/'+s.w3w : null;
  const popupHtml = `
    <div class="vp">
      <div class="vp-img" id="${imgId}"><span class="vp-loading">Loading image...</span><div class="vp-cat" style="background:${cat.color}">${cat.label}</div></div>
      <div class="vp-body">
        <div class="vp-name">${s.name}</div>
        <div class="vp-num">#${s.id} &middot; ${s.note}</div>
        <div class="vp-grid">
          <div class="vp-item"><strong>GPS:</strong> ${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}</div>
          ${s.w3w ? '<div class="vp-item"><strong>W3W:</strong> '+s.w3w+'</div>' : ''}
        </div>
        <div class="vp-links">
          <a href="${mapsUrl}" target="_blank" rel="noopener" class="vp-link vp-link-maps">&#x1F5FA; Maps</a>
          <a href="${svUrl}" target="_blank" rel="noopener" class="vp-link vp-link-sv">&#x1F4CD; Street View</a>
          ${w3wUrl ? '<a href="'+w3wUrl+'" target="_blank" rel="noopener" class="vp-link vp-link-w3w">/// W3W</a>' : ''}
        </div>
      </div>
    </div>
  `;

  m.on('click', function(){
    map.closePopup();
    openSheet(s);
  });

  spotMarkers[s.id] = m;
});

let activeRoute = 'all';
const TOGGLE_CATS = ['restroom','road','attraction'];
const isToggleSpot = s => s.cats.some(c => TOGGLE_CATS.includes(c));
const allLayer = L.layerGroup();
SPOTS.forEach(s => { if(!isToggleSpot(s)) allLayer.addLayer(spotMarkers[s.id]); });
allLayer.addTo(map);

// Each toggle route has its own independent layer, off by default. Map route key → cat key.
const TOGGLE_LAYERS = {restrooms:'restroom', roads:'road'};
const toggleState = {};
Object.entries(TOGGLE_LAYERS).forEach(([route, cat]) => {
  const spotsInCat = SPOTS.filter(s => s.cats.includes(cat));
  const layers = spotsInCat.map(s => spotMarkers[s.id]);
  // Roads can include OSM polyline geometry (s.way = array of way segments).
  if(cat === 'road'){
    const c = CATS[cat].color;
    spotsInCat.forEach(s => {
      if(!Array.isArray(s.way)) return;
      s.way.forEach(seg => {
        if(seg && seg.length >= 2){
          layers.push(L.polyline(seg, {color:c, weight:4, opacity:.7, interactive:false}));
        }
      });
    });
  }
  toggleState[route] = { layer: L.layerGroup(layers), on: false };
});

function getFiltered(){
  // Scenic routes only — toggle-cat spots render via their own layers, never here.
  if(activeRoute === 'all') return SPOTS.filter(s => !isToggleSpot(s));
  if(activeRoute === 'nearby') return SPOTS.filter(s => !isToggleSpot(s) && nearbyDist(s) <= NEARBY_M);
  return SPOTS.filter(s => s.routes.includes(activeRoute) && !isToggleSpot(s));
}

function updateAll(){
  const filtered = getFiltered();
  allLayer.clearLayers();
  filtered.forEach(s => allLayer.addLayer(spotMarkers[s.id]));

  document.getElementById('spotCount').textContent = filtered.length + ' spots';
  document.getElementById('spotDetail').textContent = activeRoute==='all' ? 'All locations' : ROUTES[activeRoute].label;

  if(filtered.length > 1){
    const bounds = L.latLngBounds(filtered.map(s=>[s.lat,s.lng]));
    map.fitBounds(bounds,{padding:[40,40],maxZoom:13});
  } else if(filtered.length === 1){
    map.setView([filtered[0].lat,filtered[0].lng],14);
  }

  updateRouteCards();
}

document.querySelectorAll('.route-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const route = btn.dataset.route;
    if(toggleState[route]){
      const t = toggleState[route];
      t.on = !t.on;
      btn.classList.toggle('active', t.on);
      btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      if(t.on) t.layer.addTo(map);
      else map.removeLayer(t.layer);
      return;
    }
    document.querySelectorAll('.route-btn').forEach(b => {
      if(!toggleState[b.dataset.route]) b.classList.remove('active');
    });
    btn.classList.add('active');
    btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    closeSheet();
    activeRoute = btn.dataset.route;
    updateAll();
  });
});

function updateRouteCards(){
  const directions = ['east','north','south','west'];
  const labels = {east:'Going East →',north:'Going North ↑',south:'Going South ↓',west:'Going West ←'};
  const colors = {east:'var(--sky)',north:'var(--pine)',south:'var(--sunset)',west:'var(--gold)'};
  const MAX_STOPS = 15;

  // Origin: user GPS if known, else Chelmsford center.
  const origin = lastUserLatLng
    ? [lastUserLatLng.lat, lastUserLatLng.lng]
    : NEARBY_CENTER_DEFAULT;
  const originLabel = lastUserLatLng ? 'from your location' : 'from Chelmsford';

  const dm = (a, b) => {
    const dlat = (a[0]-b[0])*111000;
    const dlng = (a[1]-b[1])*111000*Math.cos(a[0]*Math.PI/180);
    return Math.sqrt(dlat*dlat + dlng*dlng);
  };

  // Greedy nearest-neighbor from origin through up to maxN scenic spots.
  function nearestOrder(spots, maxN){
    const out = [];
    let cur = origin;
    const remaining = spots.slice();
    while (out.length < maxN && remaining.length){
      let bestIdx = 0, bestD = Infinity;
      for (let i = 0; i < remaining.length; i++){
        const d = dm(cur, [remaining[i].lat, remaining[i].lng]);
        if (d < bestD){ bestD = d; bestIdx = i; }
      }
      const next = remaining.splice(bestIdx, 1)[0];
      out.push(next);
      cur = [next.lat, next.lng];
    }
    return out;
  }

  document.getElementById('routeCards').innerHTML = directions.map(dir=>{
    const candidates = SPOTS.filter(s => s.routes.includes(dir) && !isToggleSpot(s));
    const ordered = nearestOrder(candidates, MAX_STOPS);
    const stops = ordered.map((s, i) =>
      '<div class="route-stop" onclick="flyTo('+s.id+')"><span class="stop-num">'+(i+1)+'</span>'+s.name+'</div>'
    ).join('');
    const more = candidates.length > MAX_STOPS
      ? '<div class="route-stop" style="opacity:.5;font-style:italic">+'+(candidates.length-MAX_STOPS)+' more</div>'
      : '';
    return '<div class="route-card" style="border-color:'+colors[dir]+'">'+
      '<h3>'+labels[dir]+'</h3>'+
      '<div style="font-size:.62rem;color:var(--text-light);margin-bottom:6px">'+candidates.length+' stops '+originLabel+'</div>'+
      stops+more+
    '</div>';
  }).join('');
}

window.flyTo = function(id){
  const s = SPOTS.find(x=>x.id===id);
  if(!s) return;
  // If the spot is a toggle-cat (restroom/road), make sure its layer is on.
  Object.entries(TOGGLE_LAYERS).forEach(([route, cat]) => {
    if(s.cats.includes(cat) && !toggleState[route].on){
      toggleState[route].on = true;
      toggleState[route].layer.addTo(map);
      const btn = document.querySelector('.route-btn[data-route="'+route+'"]');
      if(btn) btn.classList.add('active');
    }
  });
  // Otherwise: if the spot isn't in the current radio filter, switch to a
  // filter that includes it (its first route, or 'all').
  if(!isToggleSpot(s)){
    const inFilter = (activeRoute === 'all') || (activeRoute === 'nearby' && isNearbyMatches(s)) || (s.routes||[]).includes(activeRoute);
    if(!inFilter){
      const newRoute = (s.routes && s.routes.length) ? s.routes[0] : 'all';
      activeRoute = newRoute;
      document.querySelectorAll('.route-btn').forEach(b => {
        if(!toggleState[b.dataset.route]) b.classList.toggle('active', b.dataset.route === newRoute);
      });
      // Re-filter without fitBounds (don't yank the view since we're flying)
      const filtered = getFiltered();
      allLayer.clearLayers();
      filtered.forEach(x => allLayer.addLayer(spotMarkers[x.id]));
      document.getElementById('spotCount').textContent = filtered.length + ' spots';
      document.getElementById('spotDetail').textContent = ROUTES[newRoute] ? ROUTES[newRoute].label : 'All locations';
    }
  }
  map.flyTo([s.lat,s.lng],15,{duration:1});
  setTimeout(()=>openSheet(s),800);
};

function isNearbyMatches(s){
  return !isToggleSpot(s) && nearbyDist(s) <= NEARBY_M;
}

setTimeout(()=>map.invalidateSize(),100);
// Scroll active pill into view on load
const activePill=document.querySelector('.route-btn.active');
if(activePill)activePill.scrollIntoView({block:'nearest',inline:'start'});
updateAll();

// ===== USER GPS LOCATION =====
let userMarker=null, userAccuracy=null;
const userIcon = L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[18,18],iconAnchor:[9,9]});

const LocateControl = L.Control.extend({
  options:{position:'topleft'},
  onAdd:function(){
    const btn = L.DomUtil.create('button','leaflet-control-locate');
    btn.type='button';
    btn.title='Show my location';
    btn.innerHTML='&#x25CE;';
    btn.setAttribute('aria-label','Show my location');
    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn,'click',function(e){
      L.DomEvent.stop(e);
      if(lastUserLatLng){
        map.setView(lastUserLatLng,15);
      } else {
        startLocate();
      }
    });
    this._btn = btn;
    return btn;
  },
  setActive:function(on){if(this._btn)this._btn.classList.toggle('active',on);},
  setError:function(on){if(this._btn)this._btn.classList.toggle('error',on);}
});
const locateCtl = new LocateControl();
locateCtl.addTo(map);

function startLocate(){
  if(!navigator.geolocation) return;
  map.locate({watch:true,enableHighAccuracy:true,maximumAge:10000,timeout:15000});
}

map.on('locationfound',function(e){
  locateCtl.setActive(true);
  locateCtl.setError(false);
  const firstFix = !lastUserLatLng;
  lastUserLatLng = e.latlng;
  if(userMarker){
    userMarker.setLatLng(e.latlng);
    userAccuracy.setLatLng(e.latlng).setRadius(e.accuracy);
  } else {
    userMarker = L.marker(e.latlng,{icon:userIcon,interactive:false,keyboard:false,zIndexOffset:1000}).addTo(map);
    userAccuracy = L.circle(e.latlng,{radius:e.accuracy,color:'#3b82f6',weight:1,fillColor:'#3b82f6',fillOpacity:.08,interactive:false}).addTo(map);
  }
  // On first GPS fix, recompute things that depend on the user's origin
  // without yanking the map view. Refresh route planner unconditionally;
  // only fitBounds the active filter if 'Within 30 mi' is selected.
  if(firstFix){
    if(activeRoute === 'nearby') updateAll();
    else updateRouteCards();
  }
});

map.on('locationerror',function(){
  locateCtl.setActive(false);
  locateCtl.setError(true);
});

startLocate();

// ===== FULLSCREEN MAP TOGGLE =====
const FullscreenControl = L.Control.extend({
  options:{position:'topright'},
  onAdd:function(){
    const btn = L.DomUtil.create('button','leaflet-control-fs');
    btn.type='button';
    btn.title='Toggle fullscreen map';
    btn.innerHTML='&#x26F6;';
    btn.setAttribute('aria-label','Toggle fullscreen map');
    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn,'click',function(e){
      L.DomEvent.stop(e);
      const on = document.body.classList.toggle('map-fullscreen');
      btn.innerHTML = on ? '&#x2715;' : '&#x26F6;';
      btn.title = on ? 'Exit fullscreen' : 'Toggle fullscreen map';
      setTimeout(()=>map.invalidateSize(),200);
    });
    return btn;
  }
});
new FullscreenControl().addTo(map);

} // end initApp
</script>
